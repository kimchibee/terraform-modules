---
variables:
  TF_VERSION: "1.14.6"
  MODULE_NAME:
    description: "릴리스할 모듈 디렉토리명 (예: terraform-azurerm-avm-res-resources-resourcegroup)"
    value: ""
  MODULE_VERSION:
    description: "릴리스 버전 (예: v1.0.0)"
    value: ""

stages:
  - validate
  - release-approve
  - release

# ─── MR 머지 시: 변경된 모듈 자동 validate ───
validate:mr:
  stage: validate
  image:
    name: hashicorp/terraform:$TF_VERSION
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "avm/**/*"
  script:
    - |
      echo "=== 변경된 모듈 감지 ==="
      CHANGED_MODULES=$(git diff --name-only "$CI_MERGE_REQUEST_DIFF_BASE_SHA...$CI_COMMIT_SHA" -- avm/ \
        | cut -d'/' -f2 | sort -u)

      if [ -z "$CHANGED_MODULES" ]; then
        echo "변경된 모듈 없음, 스킵"
        exit 0
      fi

      for MODULE in $CHANGED_MODULES; do
        MODULE_DIR="avm/${MODULE}"
        if [ ! -d "$MODULE_DIR" ]; then
          echo "WARN: $MODULE_DIR 디렉토리가 존재하지 않음, 스킵"
          continue
        fi
        echo ""
        echo "=== Validating: $MODULE ==="
        cd "$MODULE_DIR"
        terraform init -backend=false -input=false
        terraform fmt -check -recursive
        terraform validate
        cd "$CI_PROJECT_DIR"
        echo "=== $MODULE: OK ==="
      done

# ─── 수동 릴리스: 대상 모듈 validate ───
validate:release:
  stage: validate
  image:
    name: hashicorp/terraform:$TF_VERSION
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $MODULE_NAME != "" && $MODULE_VERSION != ""'
  script:
    - |
      echo "=== 입력값 검증 ==="

      # MODULE_NAME 디렉토리 존재 확인
      if [ ! -d "avm/${MODULE_NAME}" ]; then
        echo "ERROR: avm/${MODULE_NAME} 디렉토리가 존재하지 않습니다."
        echo "사용 가능한 모듈:"
        ls avm/
        exit 1
      fi

      # MODULE_VERSION 형식 검증 (v + semver)
      if ! echo "$MODULE_VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
        echo "ERROR: MODULE_VERSION 형식이 올바르지 않습니다: $MODULE_VERSION"
        echo "올바른 형식: v1.0.0, v2.1.3 등"
        exit 1
      fi

      # 태그 중복 확인 (원격)
      TAG_NAME="avm/${MODULE_NAME}/${MODULE_VERSION}"
      if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q .; then
        echo "ERROR: 태그 '${TAG_NAME}'가 이미 존재합니다."
        exit 1
      fi

      echo "=== 입력값 검증 완료 ==="
      echo "  모듈: ${MODULE_NAME}"
      echo "  버전: ${MODULE_VERSION}"
      echo "  태그: ${TAG_NAME}"

      echo ""
      echo "=== Terraform Validate ==="
      cd "avm/${MODULE_NAME}"
      terraform init -backend=false -input=false
      terraform fmt -check -recursive
      terraform validate
      echo "=== Validate 완료 ==="

# ─── 수동 승인 게이트 ───
release:approve:
  stage: release-approve
  image:
    name: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $MODULE_NAME != "" && $MODULE_VERSION != ""'
      when: manual
      allow_failure: false
  script:
    - |
      echo "=== 릴리스 승인됨 ==="
      echo "  모듈: ${MODULE_NAME}"
      echo "  버전: ${MODULE_VERSION}"
      echo "  태그: avm/${MODULE_NAME}/${MODULE_VERSION}"
  needs:
    - validate:release

# ─── 릴리스: 태그 생성 + GitLab Release ───
release:create:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $MODULE_NAME != "" && $MODULE_VERSION != ""'
  needs:
    - release:approve
  before_script:
    - apk add --no-cache git
  script:
    - |
      TAG_NAME="avm/${MODULE_NAME}/${MODULE_VERSION}"

      echo "=== 릴리스 노트 생성 ==="
      # 동일 모듈의 이전 태그 찾기
      PREVIOUS_TAG=$(git tag -l "avm/${MODULE_NAME}/v*" --sort=-version:refname | head -1)

      if [ -n "$PREVIOUS_TAG" ]; then
        echo "이전 태그: $PREVIOUS_TAG"
        RELEASE_NOTES=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD" -- "avm/${MODULE_NAME}/")
      else
        echo "이전 태그 없음 (최초 릴리스)"
        RELEASE_NOTES=$(git log --pretty=format:"- %s (%h)" -- "avm/${MODULE_NAME}/" | head -20)
      fi

      if [ -z "$RELEASE_NOTES" ]; then
        RELEASE_NOTES="- 초기 릴리스"
      fi

      echo "=== 릴리스 노트 ==="
      echo "$RELEASE_NOTES"

      # 릴리스 노트를 파일로 저장
      cat > release_notes.md << NOTES_EOF
      ## ${MODULE_NAME} ${MODULE_VERSION}

      ### Changes
      ${RELEASE_NOTES}

      ### Module Reference
      \`\`\`hcl
      source = "git::<GITLAB_URL>/terraform-modules.git//avm/${MODULE_NAME}?ref=${TAG_NAME}"
      \`\`\`
      NOTES_EOF
  release:
    tag_name: "$TAG_NAME"
    name: "${MODULE_NAME} ${MODULE_VERSION}"
    description: "./release_notes.md"
    ref: "$CI_COMMIT_SHA"
